apiVersion: cozystack.io/v1alpha1
kind: ApplicationDefinition
metadata:
  name: mssql
  namespace: cozy-system
spec:
  application:
    kind: MSSQL
    openAPISchema: '{"title":"Chart Values","type":"object","properties":{"ACCEPT_EULA":{"default":"Y","description":"Accept the end-user licensing agreement","type":"string"},"MSSQL_PID":{"default":"Developer","description":"Product ID (Developer, Express, Standard, Enterprise)","type":"string"},"MSSQL_AGENT_ENABLED":{"default":"true","description":"Enable SQL Server Agent","type":"string"},"sa_password":{"default":"changepassword","description":"SA password","type":"string"},"storage_size":{"default":"50Gi","description":"Storage size for MSSQL data","pattern":"^(\\\\+|-)?(([0-9]+(\\\\.[0-9]*)?)|(\\\\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\\\\+|-)?(([0-9]+(\\\\.[0-9]*)?)|(\\\\.[0-9]+))))?$","anyOf":[{"type":"integer"},{"type":"string"}],"x-kubernetes-int-or-string":true}}}'
    plural: mssqls
    singular: mssql
  dashboard:
    category: PaaS
    description: Managed MSSQL service
    icon: 
    keysOrder:
    - - apiVersion
    - - appVersion
    - - kind
    - - metadata
    - - metadata
      - name
    - - spec
      - ACCEPT_EULA
    - - spec
      - MSSQL_PID
    - - spec
      - MSSQL_AGENT_ENABLED
    - - spec
      - sa_password
    - - spec
      - storage_size
    plural: MSSQL Instances
    singular: MSSQL
    tags:
    - database
    - sql
  release:
    chartRef:
      kind: ExternalArtifact
      name: cozystack-mssql-application-default-mssql
      namespace: cozy-system
    labels:
      cozystack.io/ui: "true"
    prefix: mssql-
  secrets:
    exclude: []
    include:
    - resourceNames:
      - mssql-{{ .name }}-credentials
  services:
    exclude: []
    include:
    - resourceNames:
      - mssql-{{ .name }}-external
