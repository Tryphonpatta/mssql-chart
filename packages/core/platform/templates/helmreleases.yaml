---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mssql
  namespace: cozy-system
spec:
  interval: 5m
  targetNamespace: cozy-system
  chart:
    spec:
      chart: ./packages/apps/mssql
      sourceRef:
        kind: GitRepository
        name: external-apps-mssql
        namespace: cozy-public
      version: '*'
